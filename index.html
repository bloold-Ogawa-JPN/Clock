<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS Style Clock</title>
    
    <!-- iPhoneアプリ化（PWA）設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="デジタル時計">
    <link rel="apple-touch-icon" href="icon.png">

    <!-- Webフォントも選択肢として残すためにインポート -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Chakra+Petch:wght@700&family=DotGothic16&family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark" data-font="sans-apple">

    <!-- 時計表示部分 -->
    <div class="clock-container" onclick="toggleFullscreen()">
        <div class="date-display" id="date">----年--月--日 (-)</div>
        <div class="time-wrapper">
            <span class="period-display" id="period">AM</span>
            <div class="time-display">
                <span id="time-hours">00</span><span id="time-colon" class="colon-blink">:</span><span id="time-minutes">00</span>
            </div>
            <span class="seconds-display" id="seconds">00</span>
        </div>
        <div class="guide-text" id="fullscreen-guide">画面をタップして全画面表示</div>
    </div>

    <!-- アラーム設定パネル -->
    <div class="feature-panel" id="alarm-panel">
        <p class="panel-title">⏰ アラーム設定</p>
        <div class="panel-row">
            <input type="time" id="alarm-time">
            <button class="action-btn" id="btn-alarm-toggle" onclick="toggleAlarm()">セット</button>
        </div>
        <span id="alarm-status" class="status-text">未設定</span>
        <button class="sub-action-btn" onclick="requestNotificationPermission()">通知許可をリクエスト</button>
    </div>

    <!-- タイマー設定パネル -->
    <div class="feature-panel" id="timer-panel">
        <p class="panel-title">⏱️ タイマー</p>
        <div class="panel-row" id="timer-setup">
            <input type="number" id="timer-min" min="0" max="59" value="3"> 分
            <input type="number" id="timer-sec" min="0" max="59" value="0"> 秒
            <button class="action-btn" onclick="startTimer()">開始</button>
        </div>
        <div id="timer-countdown" class="countdown-row">
            <span id="timer-display-text">03:00</span>
            <button class="cancel-btn" onclick="resetTimer()">キャンセル</button>
        </div>
    </div>

    <!-- 設定コントロール -->
    <div class="controls-container">
        <!-- 1段目：機能切り替え -->
        <div class="controls-row">
            <div class="btn-group">
                <button id="tab-clock" class="active" onclick="switchTab('clock')">時計</button>
                <button id="tab-alarm" onclick="switchTab('alarm')">アラーム</button>
                <button id="tab-timer" onclick="switchTab('timer')">タイマー</button>
            </div>
        </div>
        <!-- 2段目：外観、時間表記、カラー、明るさ -->
        <div class="controls-row">
            <div class="btn-group">
                <button id="btn-theme-dark" onclick="changeTheme('dark')">Dark</button>
                <button id="btn-theme-light" onclick="changeTheme('light')">Light</button>
            </div>
            <div class="btn-group">
                <button id="btn-format-24h" onclick="changeFormat(true)">24H</button>
                <button id="btn-format-12h" onclick="changeFormat(false)">12H</button>
            </div>
            <div class="color-picker-wrapper">
                🎨 <input type="color" id="clock-color-picker" onchange="changeClockColor(this.value)" value="#ff9500">
            </div>
            <div class="brightness-wrapper">
                🔆 <input type="range" id="brightness-slider" min="10" max="100" value="100" oninput="changeBrightness(this.value)">
            </div>
        </div>
        <!-- 3段目：iPhone内蔵フォントを含むドロップダウンリスト -->
        <div class="controls-row">
            <div class="dropdown-wrapper">
                <span class="dropdown-label">🔤 フォント:</span>
                <select id="font-selector" onchange="changeFont(this.value)">
                    <!-- iPhone(iOS)の内蔵システムフォント群 -->
                    <option value="sans-apple">iOS Standard (San Francisco)</option>
                    <option value="mono-apple">iOS Terminal (SF Mono)</option>
                    <option value="serif-apple">iOS Serif (New York)</option>
                    <option value="hiragino-gothic">ヒラギノ角ゴ (Hiragino Sans)</option>
                    <option value="hiragino-mincho">ヒラギノ明朝 (Hiragino Mincho)</option>
                    <option value="copperplate">Copperplate (クラシック体)</option>
                    <option value="futura">Futura (洗練された幾何学体)</option>
                    <!-- Webデジタルフォント群 -->
                    <option value="digital7">Digital-7 (リアル液晶)</option>
                    <option value="sans">Digital (スマート液晶)</option>
                    <option value="future">Cyber (近未来)</option>
                    <option value="pixel">Pixel (8-Bitレトロ)</option>
                </select>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
